# Инструкция для GitHub Actions: запускать бота по расписанию.
# Путь в репозитории: .github/workflows/krt-bot.yml

name: KRT bot

on:
  # Расписание. ВАЖНО: время тут в UTC, а Москва = UTC+3.
  # Ниже: каждые 2 часа с 9:00 до 21:00 по Москве (6:00-18:00 UTC).
  schedule:
    - cron: "0 6-18/2 * * *"
  # Кнопка ручного запуска во вкладке Actions (для тестов).
  workflow_dispatch:

# Разрешаем боту коммитить обновлённый seen.json обратно в репозиторий,
# чтобы он помнил, что уже постил.
permissions:
  contents: write

jobs:
  run-bot:
    runs-on: ubuntu-latest
    steps:
      - name: Забрать код из репозитория
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Поставить Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Шрифты для обложек (кириллица)
        run: sudo apt-get update && sudo apt-get install -y fonts-dejavu-core

      - name: Установить зависимости
        run: pip install -r requirements.txt

      - name: Запустить бота
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHANNEL: ${{ secrets.TELEGRAM_CHANNEL }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          REVIEW_CHAT_ID: ${{ secrets.REVIEW_CHAT_ID }}
        run: python krt_bot.py

      - name: Сохранить память и очередь обратно в репозиторий
        run: |
          git config user.name "krt-bot"
          git config user.email "bot@users.noreply.github.com"
          # Добавляем КАЖДЫЙ файл отдельно: если какого-то ещё нет,
          # это не должно мешать сохранить остальные.
          git add seen.json 2>/dev/null || true
          git add pending.json 2>/dev/null || true
          git add state.json 2>/dev/null || true
          echo "--- будет сохранено ---"
          git diff --cached --name-only
          if git commit -m "Обновление состояния бота [skip ci]"; then
            # Репозиторий мог уйти вперёд (напр. прошлый запуск уже что-то сохранил).
            # Подтягиваем свежее и пушим; при своих правках state-файлов оставляем наши.
            for i in 1 2 3; do
              if git pull --rebase -X ours --autostash origin main && git push; then
                echo "✓ Состояние сохранено в репозиторий"
                exit 0
              fi
              echo "Репозиторий обновился, повтор попытки $i..."
              sleep 3
            done
            echo "✗ Не удалось сохранить состояние после нескольких попыток."
            exit 1
          else
            echo "Нечего сохранять (изменений нет)"
          fi
