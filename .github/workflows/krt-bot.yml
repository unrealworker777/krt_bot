# Инструкция для GitHub Actions: запускать бота по расписанию.
# Путь в репозитории: .github/workflows/krt-bot.yml

name: KRT bot

on:
  # Расписание. ВАЖНО: время тут в UTC, а Москва = UTC+3.
  # Пример ниже = 10:00 и 18:00 по Москве (07:00 и 15:00 UTC).
  schedule:
    - cron: "0 7,15 * * *"
  # Кнопка ручного запуска во вкладке Actions (для тестов).
  workflow_dispatch:

# Разрешаем боту коммитить обновлённый seen.json обратно в репозиторий,
# чтобы он помнил, что уже постил.
permissions:
  contents: write

jobs:
  run-bot:
    runs-on: ubuntu-latest
    steps:
      - name: Забрать код из репозитория
        uses: actions/checkout@v4

      - name: Поставить Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Установить зависимости
        run: pip install -r requirements.txt

      - name: Запустить бота
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHANNEL: ${{ secrets.TELEGRAM_CHANNEL }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          REVIEW_CHAT_ID: ${{ secrets.REVIEW_CHAT_ID }}
        run: python krt_bot.py

      - name: Сохранить память и очередь обратно в репозиторий
        run: |
          git config user.name "krt-bot"
          git config user.email "bot@users.noreply.github.com"
          git add seen.json pending.json state.json 2>/dev/null || true
          echo "--- что изменилось ---"
          git status --short
          git commit -m "Обновление состояния бота [skip ci]" && echo "✓ Коммит создан" || echo "Коммитить нечего"
          if git push; then
            echo "✓ Состояние сохранено в репозиторий (pending.json обновлён)"
          else
            echo "✗✗✗ ПУШ НЕ УДАЛСЯ. Скорее всего нет прав на запись:"
            echo "    Settings → Actions → General → Workflow permissions → Read and write → Save"
            exit 1
          fi
